<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tax Draw Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#2563eb', light: '#eff6ff', dark: '#1d4ed8' },
            tax: { DEFAULT: '#dc2626', light: '#fef2f2' },
            keep: { DEFAULT: '#16a34a', light: '#f0fdf4' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f1f5f9; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const BRACKETS = [
      { label: '0%',    value: 0,    note: 'Under tax-free threshold' },
      { label: '19%',   value: 19,   note: '$18,201 – $45,000' },
      { label: '25%',   value: 25,   note: 'Rough effective rate' },
      { label: '30%',   value: 30,   note: 'Common small business buffer', default: true },
      { label: '32.5%', value: 32.5, note: '$45,001 – $120,000' },
      { label: '37%',   value: 37,   note: '$120,001 – $180,000' },
      { label: '47%',   value: 47,   note: '$180,001+ (inc. Medicare)' },
    ];

    function fmt(n) {
      return n.toLocaleString('en-AU', { style: 'currency', currency: 'AUD', minimumFractionDigits: 2 });
    }

    function parseExpr(expr) {
      const s = expr.replace(/\s/g, '');
      if (!s) return { total: 0, terms: [], error: false };
      if (!/^[\d.+\-*/()]+$/.test(s)) return { total: 0, terms: [], error: true };
      try {
        // Split on + only for the visible terms breakdown (handles simple addition lists)
        const terms = s.split('+').map(t => parseFloat(t)).filter(n => !isNaN(n));
        // eslint-disable-next-line no-new-func
        const total = Function('"use strict"; return (' + s + ')')();
        if (!isFinite(total) || isNaN(total)) return { total: 0, terms: [], error: true };
        return { total, terms, error: false };
      } catch {
        return { total: 0, terms: [], error: true };
      }
    }

    function App() {
      const [expr, setExpr] = useState('');
      const [rate, setRate] = useState(30);
      const [custom, setCustom] = useState('');
      const [useCustom, setUseCustom] = useState(false);

      const { total: amount, terms, error } = parseExpr(expr);
      const effectiveRate = useCustom ? (parseFloat(custom) || 0) : rate;
      const taxAmount = amount * (effectiveRate / 100);
      const totalDraw = amount + taxAmount;
      const hasValue = amount > 0 && !error;
      const showTerms = terms.length > 1;

      const handleCustomToggle = useCallback(() => {
        setUseCustom(p => !p);
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center px-4 py-8">
          <div className="w-full max-w-sm space-y-5">

            {/* Header */}
            <div className="text-center">
              <h1 className="text-2xl font-bold text-slate-800">Tax Draw Calculator</h1>
              <p className="text-sm text-slate-500 mt-1">How much to draw and save for tax</p>
            </div>

            {/* Amount input */}
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
                Amount you want to spend
              </label>
              <div className={`flex items-center border-2 rounded-xl px-4 py-3 transition-colors ${error ? 'border-red-300' : 'border-slate-200 focus-within:border-brand'}`}>
                <span className="text-xl font-semibold text-slate-400 mr-2">$</span>
                <input
                  type="text"
                  inputMode="decimal"
                  placeholder="e.g. 10.10 + 230 + 440"
                  value={expr}
                  onChange={e => setExpr(e.target.value)}
                  className="flex-1 text-xl font-bold text-slate-800 outline-none bg-transparent w-full"
                  autoComplete="off"
                  autoCorrect="off"
                  spellCheck="false"
                />
              </div>
              {error && (
                <p className="text-xs text-red-400 mt-1.5 px-1">Invalid expression — use numbers and + - * /</p>
              )}
              {showTerms && !error && (
                <div className="mt-3 space-y-1">
                  {terms.map((t, i) => (
                    <div key={i} className="flex justify-between text-sm text-slate-500 px-1">
                      <span className="text-slate-400">Item {i + 1}</span>
                      <span className="font-medium text-slate-700">{fmt(t)}</span>
                    </div>
                  ))}
                  <div className="flex justify-between text-sm font-bold pt-1.5 mt-1 border-t border-slate-100 px-1">
                    <span className="text-slate-600">Total</span>
                    <span className="text-brand">{fmt(amount)}</span>
                  </div>
                </div>
              )}
            </div>

            {/* Tax rate selector */}
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">
                Tax Rate
              </label>
              <div className="grid grid-cols-3 gap-2 mb-3">
                {BRACKETS.map(b => (
                  <button
                    key={b.value}
                    onClick={() => { setRate(b.value); setUseCustom(false); }}
                    className={`rounded-xl py-2 px-1 text-sm font-semibold transition-all border-2 ${
                      !useCustom && rate === b.value
                        ? 'bg-brand text-white border-brand shadow-md'
                        : 'bg-slate-50 text-slate-600 border-transparent hover:border-brand/40'
                    }`}
                  >
                    {b.label}
                    {b.default && !useCustom && rate === b.value && (
                      <span className="block text-[10px] font-normal opacity-80">default</span>
                    )}
                  </button>
                ))}
              </div>

              {/* ATO bracket reference */}
              {!useCustom && (
                <p className="text-xs text-slate-400 text-center mb-3">
                  {BRACKETS.find(b => b.value === rate)?.note}
                </p>
              )}

              {/* Custom rate toggle */}
              <button
                onClick={handleCustomToggle}
                className={`w-full text-xs font-semibold py-2 rounded-lg transition-colors ${
                  useCustom ? 'bg-brand/10 text-brand' : 'text-slate-400 hover:text-brand'
                }`}
              >
                {useCustom ? '✕ Cancel custom rate' : '+ Enter a custom rate'}
              </button>

              {useCustom && (
                <div className="flex items-center border-2 border-brand rounded-xl px-4 py-2 mt-2">
                  <input
                    type="number"
                    inputMode="decimal"
                    placeholder="e.g. 28"
                    value={custom}
                    onChange={e => setCustom(e.target.value)}
                    className="flex-1 text-xl font-bold text-slate-800 outline-none bg-transparent"
                  />
                  <span className="text-xl font-semibold text-slate-400">%</span>
                </div>
              )}
            </div>

            {/* Results */}
            <div className={`space-y-3 transition-opacity duration-200 ${hasValue ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>

              {/* Tax to save */}
              <div className="bg-tax-light border border-red-100 rounded-2xl p-5 flex items-center justify-between shadow-sm">
                <div>
                  <p className="text-xs font-semibold text-red-400 uppercase tracking-wide">Set aside for tax</p>
                  <p className="text-3xl font-bold text-tax mt-1">{fmt(taxAmount)}</p>
                  <p className="text-xs text-red-400 mt-0.5">at {effectiveRate}%</p>
                </div>
                <div className="text-4xl">📤</div>
              </div>

              {/* Total to draw */}
              <div className="bg-keep-light border border-green-100 rounded-2xl p-5 flex items-center justify-between shadow-sm">
                <div>
                  <p className="text-xs font-semibold text-green-600 uppercase tracking-wide">Total to draw from partnership</p>
                  <p className="text-3xl font-bold text-keep mt-1">{fmt(totalDraw)}</p>
                  <p className="text-xs text-green-500 mt-0.5">spend {fmt(amount)} + save {fmt(taxAmount)}</p>
                </div>
                <div className="text-4xl">🏦</div>
              </div>

              {/* Summary bar */}
              {hasValue && (
                <div className="bg-white rounded-2xl shadow-sm p-4">
                  <div className="flex justify-between text-xs text-slate-500 mb-1.5">
                    <span>Tax savings ({effectiveRate}%)</span>
                    <span>To spend</span>
                  </div>
                  <div className="flex rounded-full overflow-hidden h-3">
                    <div
                      className="bg-tax transition-all duration-300"
                      style={{ width: `${(taxAmount / totalDraw) * 100}%` }}
                    />
                    <div
                      className="bg-keep transition-all duration-300"
                      style={{ width: `${(amount / totalDraw) * 100}%` }}
                    />
                  </div>
                  <div className="flex justify-between text-xs font-semibold mt-1.5">
                    <span className="text-tax">{fmt(taxAmount)}</span>
                    <span className="text-keep">{fmt(amount)}</span>
                  </div>
                </div>
              )}
            </div>

            {/* Disclaimer */}
            <p className="text-center text-xs text-slate-400 pb-4">
              This is a guide only — consult your accountant for personal tax advice.
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
